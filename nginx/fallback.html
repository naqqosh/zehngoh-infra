<!doctype html>
<html lang="uz">
  <head>

    <title>Texnik ishlar olib borilmoqda</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
        background-color: #f8fafc;
        color: #1e293b;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1rem;
      }

      .container {
        max-width: 28rem;
        width: 100%;
        text-align: center;
      }

      .icon-wrapper {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 5rem;
        height: 5rem;
        background-color: #fef3c7;
        border-radius: 50%;
        margin-bottom: 2rem;
      }

      .icon-wrapper svg {
        width: 2.5rem;
        height: 2.5rem;
        color: #d97706;
      }

      h1 {
        font-size: 1.5rem;
        font-weight: 600;
        color: #0f172a;
        margin-bottom: 0.75rem;
      }

      .description {
        color: #64748b;
        margin-bottom: 2rem;
        line-height: 1.6;
      }

      .contact-box {
        background-color: #ffffff;
        border: 1px solid #e2e8f0;
        border-radius: 0.75rem;
        padding: 1.5rem;
      }

      .contact-label {
        font-size: 0.875rem;
        color: #64748b;
        margin-bottom: 0.75rem;
      }

      .telegram-btn {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        background-color: #0ea5e9;
        color: #ffffff;
        font-weight: 500;
        padding: 0.625rem 1.25rem;
        border-radius: 0.5rem;
        text-decoration: none;
        transition: background-color 0.2s;
      }

      .telegram-btn:hover {
        background-color: #0284c7;
      }

      .telegram-btn svg {
        width: 1.25rem;
        height: 1.25rem;
      }

      .footer {
        font-size: 0.75rem;
        color: #94a3b8;
        margin-top: 2rem;
      }
    </style>
  </head>
